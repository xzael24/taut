syntax = "proto3";
package taut.sync.v1;

option java_package = "taut.sync.v1";
option java_multiple_files = true;

message Transaction {
  string id = 1;
  string title = 2;
  double amount = 3;
  int64 created_at = 4;
  int64 lamport_timestamp = 5;
  string device_id = 6;
  repeated TransactionItem items = 7;
}

message TransactionItem {
  string id = 1;
  string description = 2;
  double amount = 3;
  int64 quantity = 4;
}

message SyncMetadata {
  int64 lamport_clock = 1;
  string device_id = 2;
  int64 last_sync_at = 3;
}
