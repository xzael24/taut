# ============================================================
# postgresql.conf — Custom settings for TAUT
# Mount into /etc/postgresql/postgresql.conf inside the container.
# ============================================================

# Memory
shared_buffers = 256MB
work_mem = 4MB
maintenance_work_mem = 128MB

# Write-Ahead Log
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# Connections
max_connections = 100

# Query Planner
random_page_cost = 1.1
effective_cache_size = 768MB

# Logging
log_statement = 'ddl'
log_min_duration_statement = 1000
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'

# Locale
timezone = 'Asia/Jakarta'
