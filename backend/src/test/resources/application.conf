# TAUT Backend Test Configuration
# Hardcoded values — no substitutions (for Ktor Test Host compatibility)

server {
    host = "0.0.0.0"
    port = 8080
}

database {
    url = "jdbc:postgresql://localhost:5432/taut_test"
    user = "taut"
    password = "taut_test"
    maximumPoolSize = 2
    minimumIdle = 1
    idleTimeout = 300000
    connectionTimeout = 30000
    maxLifetime = 1800000
}

jwt {
    secret = "test-jwt-secret-for-unit-tests-only-not-used-in-production"
    accessTokenExpirySeconds = 900
    refreshTokenExpirySeconds = 2592000
    issuer = "taut-test"
    audience = "taut-api-test"
}

flyway {
    enabled = false
    locations = ["classpath:db/migration"]
    baselineOnMigrate = false
}