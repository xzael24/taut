# TAUT Backend Configuration
# All secrets MUST come from environment variables.
# The app will fail to start without them.

server {
    host = "0.0.0.0"
    port = 8080
}

database {
    url = ${?TAUT_DB_URL}
    user = ${?TAUT_DB_USER}
    password = ${?TAUT_DB_PASSWORD}
    maximumPoolSize = 20
    minimumIdle = 5
    idleTimeout = 300000
    connectionTimeout = 30000
    maxLifetime = 1800000
}

jwt {
    secret = ${?TAUT_JWT_SECRET}
    accessTokenExpirySeconds = 900
    refreshTokenExpirySeconds = 2592000
    issuer = "taut"
    audience = "taut-api"
}

flyway {
    enabled = true
    locations = ["classpath:db/migration"]
    baselineOnMigrate = true
}
