# ==============================================================================
# GitHub Actions CI Pipeline for TAUT Project
# ==============================================================================

name: TAUT CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'android/**'
      - '.github/workflows/ci.yml'
      - 'docker/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'android/**'
      - '.github/workflows/ci.yml'
      - 'docker/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  # ── Backend — Build, lint, and test ──────────────────────
  backend-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taut
          POSTGRES_USER: taut
          POSTGRES_PASSWORD: taut
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taut -d taut"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-bk-${{ hashFiles('backend/**/*.gradle.kts', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-bk-

      - name: Compile Kotlin (lint check)
        run: ./gradlew --no-daemon compileKotlin compileTestKotlin

      - name: Run backend tests
        run: ./gradlew --no-daemon test
        env:
          TAUT_JWT_SECRET: ${{ secrets.TAUT_JWT_SECRET || 'test-jwt-secret-for-ci-at-least-32-chars!' }}
          TAUT_DB_PASSWORD: taut
          TAUT_DB_USER: taut
          TAUT_DB_URL: jdbc:postgresql://localhost:5432/taut

      - name: Upload backend test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: backend/build/reports/
          retention-days: 7

  # ── Android — Build and unit tests ────────────────────────
  android-test:
    name: Android — Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-android-

      - name: Compile Kotlin (lint check)
        run: ./gradlew --no-daemon compileDebugKotlin

      - name: Run Android unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Upload Android test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          path: android/app/build/reports/
          retention-days: 7

  # ── Docker — Build verification ───────────────────────────
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, android-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -f Dockerfile -t taut-backend:${{ github.sha }} .

      - name: Verify image exists
        run: docker image inspect taut-backend:${{ github.sha }}

      - name: Smoke test (start container briefly)
        env:
          TAUT_JWT_SECRET: ${{ secrets.TAUT_JWT_SECRET || 'taut-ci-temp-secret-at-least-32chars-long!' }}
          TAUT_DB_PASSWORD: ${{ secrets.TAUT_DB_PASSWORD || 'taut-ci-temp-pw' }}
        run: |
          docker run -d --name taut-smoke-test \
            -e TAUT_JWT_SECRET="$TAUT_JWT_SECRET" \
            -e TAUT_DB_PASSWORD="$TAUT_DB_PASSWORD" \
            -e TAUT_DB_URL="jdbc:postgresql://postgres:5432/taut" \
            -e TAUT_DB_USER="taut" \
            taut-backend:${{ github.sha }}
          sleep 10
          echo "--- Container logs ---"
          docker logs taut-smoke-test 2>&1 || true
          docker stop taut-smoke-test || true
          docker rm taut-smoke-test || true
